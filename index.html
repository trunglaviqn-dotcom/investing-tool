<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Pro Invest - Future Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 16px; }
        .neon-text { background: linear-gradient(90deg, #22d3ee 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-border:focus { box-shadow: 0 0 20px rgba(34, 211, 238, 0.4); border-color: #22d3ee; }
        .scroll-hidden::-webkit-scrollbar { width: 3px; }
        .scroll-hidden::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .active-row { background: rgba(59, 130, 246, 0.2); border-left: 4px solid #22d3ee; }
        .flash-buy { animation: flashBuy 0.4s ease-out; }
        .flash-sell { animation: flashSell 0.4s ease-out; }
        @keyframes flashBuy { 0% { background: rgba(34, 197, 94, 0.4); } 100% { background: transparent; } }
        @keyframes flashSell { 0% { background: rgba(239, 68, 68, 0.4); } 100% { background: transparent; } }
    </style>
</head>
<body class="h-screen flex flex-col p-3 gap-3">

    <nav class="glass-panel px-6 py-4 flex justify-between items-center shrink-0 border-cyan-500/30">
        <div class="flex items-center space-x-8">
            <span class="text-3xl font-black neon-text tracking-tighter uppercase">HENRY PRO INVEST</span>
            
            <div class="relative group">
                <input type="text" id="search-input" placeholder="Tìm mã & Thêm Watchlist..." 
                    class="bg-slate-950 border border-slate-800 text-cyan-100 placeholder-slate-600 text-sm rounded-xl pl-5 pr-12 py-2 focus:outline-none w-72 transition-all neon-border" 
                    onkeypress="handleSearch(event)">
                <div class="absolute right-4 top-2.5 text-slate-600 text-[10px] font-bold">ENTER</div>
            </div>
        </div>
        
        <div id="connection-status" class="flex items-center space-x-3 text-xs text-cyan-400 font-bold bg-cyan-950/30 px-4 py-2 rounded-full border border-cyan-500/20">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500 shadow-[0_0_10px_#22d3ee]"></span>
            </span>
            <span>DNSE LIGHTSPEED ACTIVE</span>
        </div>
    </nav>

    <main class="grid grid-cols-12 gap-3 flex-1 min-h-0">
        
        <section class="col-span-3 flex flex-col gap-3">
            <div class="glass-panel flex flex-col h-3/5 overflow-hidden">
                <div class="p-4 border-b border-slate-800/50 flex justify-between items-center bg-slate-900/50">
                    <h3 class="font-bold text-xs text-slate-400 uppercase tracking-widest">Danh mục theo dõi</h3>
                </div>
                <div class="overflow-y-auto scroll-hidden flex-1">
                    <table class="w-full text-xs text-left">
                        <tbody id="watchlist-body" class="cursor-pointer"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass-panel p-5 flex-1 flex flex-col justify-between border-blue-500/20">
                <div>
                    <h2 class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-4">Phân tích AI: <span id="current-symbol" class="text-white text-lg ml-2">---</span></h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <span class="text-[10px] text-slate-500 block">TARGET T+</span>
                            <span id="fc-ngan" class="text-lg font-bold text-cyan-400">---</span>
                        </div>
                        <div class="space-y-1 text-right">
                            <span class="text-[10px] text-slate-500 block">STOP LOSS</span>
                            <span id="sl-ngan" class="text-lg font-bold text-red-500">---</span>
                        </div>
                    </div>
                </div>
                <div class="mt-4 p-3 bg-slate-950/50 rounded-xl border border-slate-800 text-[11px] leading-relaxed text-slate-400 italic">
                    <span class="text-blue-400 font-bold not-italic block mb-1">LUẬN ĐIỂM CHIẾN LƯỢC</span>
                    <span id="fc-lydo">Chọn một mã để xem kịch bản...</span>
                </div>
            </div>
        </section>

        <section class="col-span-6 flex flex-col gap-3">
            <div class="glass-panel h-2/3 overflow-hidden relative" id="chart-container"></div>

            <div class="grid grid-cols-2 gap-3 h-1/3">
                <div class="glass-panel flex flex-col overflow-hidden">
                    <div class="p-2 text-center text-[10px] font-bold text-slate-500 border-b border-slate-800/50">SỔ LỆNH THỜI GIAN THỰC</div>
                    <div class="flex-1 grid grid-cols-2 text-[11px] font-mono">
                        <div id="order-bids" class="border-r border-slate-800/50"></div>
                        <div id="order-asks"></div>
                    </div>
                </div>
                <div class="glass-panel flex flex-col overflow-hidden">
                    <div class="p-2 text-center text-[10px] font-bold text-slate-500 border-b border-slate-800/50">KHỚP LỆNH LIÊN TỤC</div>
                    <div class="flex-1 overflow-y-auto scroll-hidden px-2 py-1" id="trade-history"></div>
                </div>
            </div>
        </section>

        <section class="col-span-3 flex flex-col">
            <div class="glass-panel flex-1 flex flex-col overflow-hidden border-purple-500/20">
                <div class="p-4 border-b border-slate-800/50 bg-slate-900/50">
                    <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest flex items-center">
                        <span class="w-1.5 h-1.5 bg-purple-500 rounded-full mr-2 shadow-[0_0_8px_#a855f7]"></span>
                        Smart Money Feed
                    </h3>
                </div>
                <div id="alert-feed" class="p-4 space-y-3 overflow-y-auto scroll-hidden flex-1 text-[11px]"></div>
            </div>
        </section>
    </main>

    <script>
        // 1. LOCALSTORAGE & DEFAULT DATA
        const DEFAULT_LIST = [
            { symbol: "HUT", price: 17.00, isCrypto: false },
            { symbol: "STB", price: 31.50, isCrypto: false },
            { symbol: "BTCUSD", price: 65400.00, isCrypto: true }
        ];

        const FORECAST_DB = {
            "HUT": { ngan: "18,50", sl: "16,20", lydo: "Hưởng lợi nâng hạng FTSE & VETC, dòng tiền CFO ổn định." },
            "STB": { ngan: "33,50", sl: "31,00", lydo: "LNST 2026 dự kiến 8100 tỷ, nợ xấu được xử lý tốt." },
            "BTCUSD": { ngan: "68.000,00", sl: "61.000,00", lydo: "Chu kỳ halving và dòng vốn ETF mạnh mẽ." }
        };

        let watchlist = JSON.parse(localStorage.getItem('henry_watchlist')) || DEFAULT_LIST;
        let activeSymbol = watchlist[0].symbol;

        // 2. SEARCH & WATCHLIST LOGIC
        function saveList() { localStorage.setItem('henry_watchlist', JSON.stringify(watchlist)); }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                const sym = e.target.value.toUpperCase();
                if (sym && !watchlist.find(i => i.symbol === sym)) {
                    watchlist.push({ symbol: sym, price: 0, isCrypto: sym.includes('USD') });
                    saveList();
                    renderWatchlist();
                    selectSymbol(sym);
                }
                e.target.value = '';
            }
        }

        function removeSymbol(sym) {
            watchlist = watchlist.filter(i => i.symbol !== sym);
            saveList();
            renderWatchlist();
            if(activeSymbol === sym) selectSymbol(watchlist[0]?.symbol || '');
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlist-body');
            container.innerHTML = watchlist.map(item => `
                <tr class="border-b border-slate-800/40 hover:bg-slate-800/30 transition-all ${item.symbol === activeSymbol ? 'active-row' : ''}">
                    <td class="p-4 font-bold text-cyan-400" onclick="selectSymbol('${item.symbol}')">${item.symbol}</td>
                    <td class="p-4 text-right font-mono font-bold text-green-400" id="list-price-${item.symbol}">---</td>
                    <td class="p-4 text-right"><button onclick="removeSymbol('${item.symbol}')" class="text-slate-600 hover:text-red-500">×</button></td>
                </tr>
            `).join('');
        }

        // 3. CORE TERMINAL UI
        function selectSymbol(sym) {
            if(!sym) return;
            activeSymbol = sym;
            document.getElementById('current-symbol').innerText = sym;
            
            const data = FORECAST_DB[sym] || { ngan: "---", sl: "---", lydo: "Chưa có dữ liệu phân tích AI cho mã này." };
            document.getElementById('fc-ngan').innerText = data.ngan;
            document.getElementById('sl-ngan').innerText = data.sl;
            document.getElementById('fc-lydo').innerText = data.lydo;

            renderWatchlist();
            initChart(sym);
        }

        function initChart(sym) {
            document.getElementById('chart-container').innerHTML = `<div id="tv_chart_box" class="h-full"></div>`;
            new TradingView.widget({
                "autosize": true, "symbol": (sym.includes('USD') ? "BINANCE:" : "HOSE:") + sym,
                "interval": "D", "theme": "dark", "style": "1", "locale": "vi_VN",
                "container_id": "tv_chart_box", "backgroundColor": "rgba(2, 6, 23, 1)", "hide_top_toolbar": true
            });
        }

        // 4. DATA SIMULATION (Lấy từ DNSE LightSpeed giả lập)
        function simulateData() {
            watchlist.forEach(item => {
                const el = document.getElementById(`list-price-${item.symbol}`);
                if(!el) return;
                
                // Giả lập giá nhảy
                let newPrice = item.price > 0 ? item.price + (Math.random() * 0.2 - 0.1) : (Math.random() * 50 + 10);
                item.price = newPrice;
                el.innerText = item.isCrypto ? newPrice.toLocaleString('vi-VN') : newPrice.toFixed(2).replace('.', ',');
                
                if(item.symbol === activeSymbol) updateOrderBook(newPrice, item.isCrypto);
            });
        }

        function updateOrderBook(price, isCrypto) {
            const step = isCrypto ? 20 : 0.05;
            const bids = document.getElementById('order-bids');
            const asks = document.getElementById('order-asks');
            
            bids.innerHTML = Array.from({length:6}, (_, i) => `
                <div class="flex justify-between p-1.5 px-3 text-green-400">
                    <span class="opacity-40">${Math.floor(Math.random()*900)}</span>
                    <span class="font-bold">${(price - step*(i+1)).toFixed(2).replace('.',',')}</span>
                </div>
            `).join('');

            asks.innerHTML = Array.from({length:6}, (_, i) => `
                <div class="flex justify-between p-1.5 px-3 text-red-400">
                    <span class="font-bold">${(price + step*(i+1)).toFixed(2).replace('.',',')}</span>
                    <span class="opacity-40">${Math.floor(Math.random()*900)}</span>
                </div>
            `).join('');
        }

        function addTrade() {
            const container = document.getElementById('trade-history');
            const isBuy = Math.random() > 0.4;
            const vol = Math.floor(Math.random() * 500) * 10;
            const div = document.createElement('div');
            div.className = `flex justify-between py-1 border-b border-slate-800/30 ${isBuy ? 'flash-buy text-green-400' : 'flash-sell text-red-400'}`;
            div.innerHTML = `<span>${new Date().toLocaleTimeString('vi-VN')}</span> <span class="font-bold">${vol.toLocaleString('vi-VN')}</span>`;
            container.prepend(div);
            if(container.children.length > 20) container.removeChild(container.lastChild);

            if(vol > 4000) {
                const feed = document.getElementById('alert-feed');
                const alert = document.createElement('div');
                alert.className = `p-3 rounded-lg border-l-2 mb-2 ${isBuy ? 'bg-cyan-900/20 border-cyan-500 text-cyan-200' : 'bg-red-900/20 border-red-500 text-red-200'}`;
                alert.innerHTML = `<span class="font-black">🔥 BIG ORDER:</span> ${activeSymbol} khớp chủ động ${vol.toLocaleString('vi-VN')} CP`;
                feed.prepend(alert);
                if(feed.children.length > 10) feed.removeChild(feed.lastChild);
            }
        }

        window.onload = () => {
            renderWatchlist();
            selectSymbol(activeSymbol);
            setInterval(simulateData, 2000);
            setInterval(addTrade, 1000);
        };
    </script>
</body>
</html>
