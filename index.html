<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Pro Invest - TradingView Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #04060e; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif; overflow: hidden; }
        .terminal-border { border: 1px solid #2a2e39; }
        .active-tab { border-bottom: 2px solid #2962ff; color: #2962ff; }
        .glass-header { background: rgba(19, 23, 34, 0.95); backdrop-filter: blur(4px); border-bottom: 1px solid #2a2e39; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="glass-header px-6 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center space-x-4">
            <span class="text-2xl font-black tracking-tighter text-white">HENRY PRO <span class="text-blue-500">INVEST</span></span>
            <div class="h-5 w-px bg-slate-700"></div>
            <span class="text-[10px] uppercase tracking-[0.2em] text-slate-500">Global Market Insight</span>
        </div>
        <div class="flex items-center space-x-6 text-xs font-bold">
            <div class="flex flex-col items-end">
                <span class="text-green-500">VN-INDEX: 1.802,45</span>
                <span class="text-[9px] text-slate-500">Real-time via TradingView</span>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-[11px] transition">LOGIN TERMINAL</button>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-1 p-1 min-h-0">
        
        <aside class="col-span-3 flex flex-col gap-1 overflow-hidden">
            <div class="flex-1 terminal-border rounded bg-[#131722] overflow-hidden">
                <div class="tradingview-widget-container" style="height:100%; width:100%">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                    {
                    "width": "100%",
                    "height": "100%",
                    "symbolsGroups": [
                        {
                        "name": "Chứng Khoán VN",
                        "originalName": "Stocks",
                        "symbols": [
                            { "name": "HOSE:HUT", "displayName": "Tasco (HUT)" },
                            { "name": "HOSE:STB", "displayName": "Sacombank" },
                            { "name": "HOSE:VIX", "displayName": "VIX" },
                            { "name": "HOSE:VIC", "displayName": "Vingroup" },
                            { "name": "HOSE:VHM", "displayName": "Vinhomes" }
                        ]
                        },
                        {
                        "name": "Global & Crypto",
                        "symbols": [
                            { "name": "FX_IDC:VNINDEX", "displayName": "VN-INDEX" },
                            { "name": "BINANCE:BTCUSDT", "displayName": "Bitcoin" },
                            { "name": "OANDA:XAUUSD", "displayName": "Vàng (Gold)" }
                        ]
                        }
                    ],
                    "showSymbolLogo": true,
                    "colorTheme": "dark",
                    "isTransparent": true,
                    "locale": "vi"
                    }
                    </script>
                </div>
                </div>
        </aside>

        <section class="col-span-6 flex flex-col terminal-border rounded bg-[#131722] overflow-hidden">
            <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
                <div id="tradingview_advanced_chart" style="height: 100%; width: 100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "HOSE:HUT",
                    "interval": "D",
                    "timezone": "Asia/Ho_Chi_Minh",
                    "theme": "dark",
                    "style": "1",
                    "locale": "vi",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_advanced_chart"
                });
                </script>
            </div>
            </section>

        <aside class="col-span-3 flex flex-col gap-1 overflow-hidden">
            <div class="h-1/2 terminal-border rounded bg-[#131722] overflow-hidden p-2">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "HOSE:HUT",
                    "showIntervalTabs": true,
                    "locale": "vi",
                    "colorTheme": "dark"
                    }
                    </script>
                </div>
            </div>

            <div class="h-1/2 terminal-border rounded bg-[#131722] p-4 flex flex-col justify-between">
                <div>
                    <h3 class="text-blue-500 font-bold text-xs uppercase tracking-widest mb-4">Henry AI Strategy</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-end border-b border-slate-800 pb-2">
                            <span class="text-xs text-slate-500">Mục tiêu Q2</span>
                            <span class="text-lg font-bold text-green-400">22,50</span>
                        </div>
                        <div class="flex justify-between items-end border-b border-slate-800 pb-2">
                            <span class="text-xs text-slate-500">Cắt lỗ (Hard)</span>
                            <span class="text-lg font-bold text-red-500">15,80</span>
                        </div>
                    </div>
                </div>
                <div class="bg-blue-900/20 p-3 rounded text-[11px] text-blue-300 italic leading-relaxed border border-blue-500/20">
                    "HUT đang hình thành tay cầm của mô hình Cốc tay cầm trên đồ thị Tuần. Dòng tiền thông minh (Smart Money) có dấu hiệu gom hàng tại vùng 16,5 - 16,8."
                </div>
            </div>
        </aside>
    </main>

    <footer class="h-10 shrink-0 bg-[#131722] border-t border-slate-800">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
                { "proName": "FX_IDC:VND", "title": "USD/VND" },
                { "proName": "BITSTAMP:BTCUSD", "title": "Bitcoin" },
                { "proName": "OANDA:XAUUSD", "title": "Vàng" }
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "vi"
            }
            </script>
        </div>
    </footer>

</body>
</html>
