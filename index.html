<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Pro Invest - DNSE Open API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; overflow: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(34, 211, 238, 0.2); border-radius: 12px; }
        .neon-text { background: linear-gradient(90deg, #22d3ee 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .active-row { background: rgba(34, 211, 238, 0.15); border-left: 4px solid #22d3ee; }
        .scroll-hidden::-webkit-scrollbar { width: 4px; }
        .scroll-hidden::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .flash-buy { animation: flashBuy 0.4s ease-out; }
        .flash-sell { animation: flashSell 0.4s ease-out; }
        @keyframes flashBuy { 0% { background: rgba(34, 197, 94, 0.3); } 100% { background: transparent; } }
        @keyframes flashSell { 0% { background: rgba(239, 68, 68, 0.3); } 100% { background: transparent; } }
    </style>
</head>
<body class="h-screen flex flex-col p-2 gap-2">

    <nav class="glass-panel px-6 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center space-x-6">
            <span class="text-2xl font-black neon-text tracking-tighter uppercase">HENRY PRO INVEST</span>
            <input type="text" id="search-input" placeholder="Tìm mã (VD: HUT, STB)..." 
                class="bg-slate-950 border border-slate-800 text-cyan-100 text-xs rounded-lg pl-4 pr-4 py-1.5 focus:outline-none w-56 focus:border-cyan-500 transition uppercase" 
                onkeypress="handleSearch(event)">
        </div>
        
        <div class="flex items-center space-x-4">
            <div class="flex flex-col text-right mr-4">
                <span id="ping-latency" class="text-[9px] text-slate-500 font-mono">Ping: --- ms</span>
                <span id="msg-count" class="text-[9px] text-cyan-500 font-mono">Msgs: 0</span>
            </div>
            <div id="conn-status" class="flex items-center space-x-2 text-[10px] font-bold px-3 py-1.5 rounded-full border border-slate-800 bg-slate-900 cursor-pointer" onclick="reconnectWS()">
                <span id="conn-dot" class="h-2 w-2 rounded-full bg-red-500"></span>
                <span id="conn-text" class="text-slate-500 uppercase">DISCONNECTED</span>
            </div>
        </div>
    </nav>

    <main class="grid grid-cols-12 gap-2 flex-1 min-h-0">
        <div class="col-span-3 glass-panel flex flex-col overflow-hidden">
            <div class="p-3 border-b border-slate-800 text-[10px] font-bold text-slate-500 uppercase flex justify-between">
                <span>Watchlist (Real-time)</span>
            </div>
            <div class="flex-1 overflow-y-auto scroll-hidden">
                <table class="w-full text-xs">
                    <tbody id="watchlist-body" class="cursor-pointer"></tbody>
                </table>
            </div>
        </div>

        <div class="col-span-6 flex flex-col gap-2">
            <div class="glass-panel flex-1 overflow-hidden relative" id="chart-container"></div>
            <div class="glass-panel p-3 grid grid-cols-4 gap-2 text-center items-center">
                <div class="border-r border-slate-800">
                    <div class="text-[9px] text-slate-500 uppercase">Mã Giao Dịch</div>
                    <div id="info-sym" class="text-lg font-black text-cyan-400">---</div>
                </div>
                <div class="border-r border-slate-800">
                    <div class="text-[9px] text-slate-500 uppercase">Giá Khớp</div>
                    <div id="info-price" class="text-lg font-bold text-white font-mono">---</div>
                </div>
                <div class="border-r border-slate-800">
                    <div class="text-[9px] text-slate-500 uppercase">Tổng Khối Lượng</div>
                    <div id="info-vol" class="text-sm font-bold text-purple-400 font-mono">---</div>
                </div>
                <div>
                    <div class="text-[9px] text-slate-500 uppercase">Giá Trị Giao Dịch</div>
                    <div id="info-val" class="text-sm font-bold text-green-400 font-mono">---</div>
                </div>
            </div>
        </div>

        <div class="col-span-3 flex flex-col gap-2">
            <div class="glass-panel h-1/2 flex flex-col overflow-hidden">
                <div class="p-2 border-b border-slate-800 text-[10px] font-bold text-cyan-500 text-center uppercase tracking-widest bg-slate-900/50">Sổ Lệnh (Độ sâu thị trường)</div>
                <div class="flex-1 grid grid-cols-2 text-[10px] font-mono">
                    <div class="border-r border-slate-800 flex flex-col">
                        <div class="text-center p-1 bg-slate-800/30 text-slate-400">KL MUA | GIÁ</div>
                        <div id="quote-bids" class="flex-1 p-1 space-y-0.5"></div>
                    </div>
                    <div class="flex flex-col">
                        <div class="text-center p-1 bg-slate-800/30 text-slate-400">GIÁ | KL BÁN</div>
                        <div id="quote-asks" class="flex-1 p-1 space-y-0.5"></div>
                    </div>
                </div>
            </div>
            <div class="glass-panel flex-1 flex flex-col overflow-hidden">
                <div class="p-2 border-b border-slate-800 text-[10px] font-bold text-purple-400 text-center uppercase tracking-widest bg-slate-900/50">Khớp Lệnh Liên Tục</div>
                <div class="flex-1 overflow-y-auto scroll-hidden px-2 py-1">
                    <table class="w-full text-[10px] font-mono text-right">
                        <tbody id="trade-history"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. CẤU HÌNH HỆ THỐNG DỰA TRÊN DOCS DNSE ---
        const DNSE_WS_URL = "wss://ws-openapi.dnse.com.vn";
        
        let ws = null;
        let pingInterval = null;
        let lastPingTime = 0;
        let msgCount = 0;

        let watchlist = JSON.parse(localStorage.getItem('hpi_symbols')) || ["HUT", "STB", "HPG", "VNINDEX"];
        let activeSym = watchlist[0];

        // --- 2. LOGIC WEBSOCKET (Đúng chuẩn DNSE) ---
        function connectDNSE() {
            updateStatus('CONNECTING', 'bg-yellow-500', 'animate-pulse');
            
            if (ws) {
                clearInterval(pingInterval);
                ws.close();
            }

            ws = new WebSocket(DNSE_WS_URL);

            ws.onopen = () => {
                updateStatus('CONNECTED', 'bg-cyan-500', 'shadow-[0_0_8px_#22d3ee]');
                
                // Đăng ký kênh dữ liệu theo chuẩn. 
                // (Tùy thuộc SDK, cấu trúc payload subscribe có thể cần điều chỉnh phần 'action')
                subscribeToChannels(watchlist);

                // Triển khai "Case 3: Client-initiated keepalive" theo tài liệu
                // Gửi PING chủ động mỗi 2 phút (120,000 ms) để chống rớt mạng
                pingInterval = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        lastPingTime = Date.now();
                        ws.send(JSON.stringify({ action: "PING" })); // Gửi PING
                    }
                }, 120000); 
            };

            ws.onmessage = (event) => {
                msgCount++;
                document.getElementById('msg-count').innerText = `Msgs: ${msgCount}`;

                const rawData = event.data;
                
                // Xử lý "Case 1: Good interaction" - Phản hồi PING từ server
                if (rawData === "PING" || rawData.includes("PING")) {
                    ws.send("PONG");
                    return;
                }
                if (rawData === "PONG" || rawData.includes("PONG")) {
                    const latency = Date.now() - lastPingTime;
                    document.getElementById('ping-latency').innerText = `Ping: ${latency}ms`;
                    return;
                }

                try {
                    const data = JSON.parse(rawData);
                    routeData(data);
                } catch(e) {}
            };

            ws.onclose = () => {
                updateStatus('DISCONNECTED', 'bg-red-500', '');
                clearInterval(pingInterval);
                // Tự động kết nối lại sau 5 giây
                setTimeout(connectDNSE, 5000); 
            };

            ws.onerror = (err) => {
                console.error("WS Error");
            };
        }

        // Đăng ký kênh dữ liệu
        function subscribeToChannels(symbols) {
            if(ws.readyState !== WebSocket.OPEN) return;
            // Subscribe Trade & Quote
            ws.send(JSON.stringify({
                action: "subscribe",
                channels: ["Trade", "Quote"], 
                symbols: symbols
            }));
        }

        // --- 3. ĐIỀU HƯỚNG DỮ LIỆU TỪ SERVER VÀO GIAO DIỆN ---
        function routeData(data) {
            // Cập nhật Watchlist chung nếu có trường price
            if (data.symbol && data.price) {
                const row = document.getElementById(`wl-price-${data.symbol}`);
                if (row) {
                    row.innerText = data.price.toLocaleString('vi-VN');
                    row.classList.add('text-white');
                    setTimeout(() => row.classList.remove('text-white'), 300);
                }
            }

            // Chỉ render chi tiết nếu là mã đang Active
            if (data.symbol !== activeSym) return;

            // Dữ liệu Khớp lệnh (Trade)
            if (data.price && data.quantity) {
                renderTrade(data);
            }
            
            // Dữ liệu Sổ lệnh (Quote)
            if (data.bid && data.offer) {
                renderQuote(data);
            }
        }

        // Render bảng Quote dựa đúng theo Payload Docs
        function renderQuote(data) {
            const bidsEl = document.getElementById('quote-bids');
            const asksEl = document.getElementById('quote-asks');
            
            // Render 3 mức giá Mua (bids)
            bidsEl.innerHTML = data.bid.slice(0, 3).map(b => `
                <div class="flex justify-between px-2 py-0.5 text-green-400 hover:bg-green-900/30 rounded">
                    <span class="opacity-70">${(b.quantity).toLocaleString('vi-VN')}</span>
                    <span class="font-bold">${b.price.toFixed(2)}</span>
                </div>
            `).join('');

            // Render 3 mức giá Bán (offer/asks)
            asksEl.innerHTML = data.offer.slice(0, 3).map(o => `
                <div class="flex justify-between px-2 py-0.5 text-red-400 hover:bg-red-900/30 rounded">
                    <span class="font-bold">${o.price.toFixed(2)}</span>
                    <span class="opacity-70">${(o.quantity).toLocaleString('vi-VN')}</span>
                </div>
            `).join('');
        }

        // Render bảng Khớp lệnh (Trade)
        function renderTrade(data) {
            // Cập nhật Header
            document.getElementById('info-price').innerText = data.price.toLocaleString('vi-VN');
            if(data.totalVolumeTraded) document.getElementById('info-vol').innerText = data.totalVolumeTraded.toLocaleString('vi-VN');
            if(data.grossTradeAmount) document.getElementById('info-val').innerText = (data.grossTradeAmount / 1000000).toFixed(2) + ' Tỷ';

            // Cập nhật lịch sử khớp
            const histEl = document.getElementById('trade-history');
            const row = document.createElement('tr');
            
            // Đoán chiều mua/bán (Demo color, nếu API có trường "side" thì dùng "side")
            const isBuy = data.side === "BUY" || Math.random() > 0.5; 
            row.className = `border-b border-slate-800/30 ${isBuy ? 'text-green-400 flash-buy' : 'text-red-400 flash-sell'}`;
            
            const timeStr = new Date().toLocaleTimeString('vi-VN', {hour12: false});
            row.innerHTML = `
                <td class="p-1 text-left text-slate-500">${timeStr}</td>
                <td class="p-1 font-bold">${data.price.toFixed(2)}</td>
                <td class="p-1">${data.quantity.toLocaleString('vi-VN')}</td>
            `;
            
            histEl.prepend(row);
            if (histEl.children.length > 25) histEl.removeChild(histEl.lastChild);
        }

        // --- 4. UI HELPER ---
        function updateStatus(text, bgClass, extraClass) {
            document.getElementById('conn-text').innerText = text;
            const dot = document.getElementById('conn-dot');
            dot.className = `h-2 w-2 rounded-full ${bgClass} ${extraClass}`;
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                let sym = e.target.value.toUpperCase().trim();
                if (sym && !watchlist.includes(sym)) {
                    watchlist.push(sym);
                    localStorage.setItem('hpi_symbols', JSON.stringify(watchlist));
                    subscribeToChannels([sym]); // Subscribe mã mới
                    renderWatchlist();
                }
                e.target.value = '';
                selectSymbol(sym);
            }
        }

        function removeSymbol(sym) {
            watchlist = watchlist.filter(s => s !== sym);
            localStorage.setItem('hpi_symbols', JSON.stringify(watchlist));
            renderWatchlist();
        }

        function selectSymbol(sym) {
            if(!sym) return;
            activeSym = sym;
            document.getElementById('info-sym').innerText = sym;
            renderWatchlist();
            initChart(sym);
            
            // Xóa lịch sử cũ trên UI
            document.getElementById('trade-history').innerHTML = '';
            document.getElementById('quote-bids').innerHTML = '';
            document.getElementById('quote-asks').innerHTML = '';
        }

        function renderWatchlist() {
            const body = document.getElementById('watchlist-body');
            body.innerHTML = watchlist.map(sym => `
                <tr class="border-b border-slate-800/50 transition-all ${sym === activeSym ? 'active-row' : ''}" onclick="selectSymbol('${sym}')">
                    <td class="p-3 font-bold text-cyan-400 uppercase">${sym}</td>
                    <td class="p-3 text-right font-mono text-slate-300" id="wl-price-${sym}">Wait...</td>
                    <td class="p-3 text-right"><button onclick="removeSymbol('${sym}')" class="text-slate-600 hover:text-red-500 px-2">×</button></td>
                </tr>
            `).join('');
        }

        function initChart(sym) {
            document.getElementById('chart-container').innerHTML = `<div id="tv_chart_box" class="h-full absolute inset-0"></div>`;
            new TradingView.widget({
                "autosize": true, "symbol": "HOSE:" + sym, "interval": "D", "theme": "dark", 
                "container_id": "tv_chart_box", "hide_top_toolbar": true, "backgroundColor": "rgba(2, 6, 23, 1)"
            });
        }

        function reconnectWS() { connectDNSE(); }

        window.onload = () => {
            renderWatchlist();
            selectSymbol(activeSym);
            connectDNSE(); // Chạy WSS ngay khi mở web
        };
    </script>
</body>
</html>
