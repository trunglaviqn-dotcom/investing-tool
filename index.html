<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Pro Invest - Real-time Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; overflow: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(34, 211, 238, 0.2); border-radius: 12px; }
        .neon-text { background: linear-gradient(90deg, #22d3ee 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .active-row { background: rgba(34, 211, 238, 0.15); border-left: 4px solid #22d3ee; }
        .red-flag { color: #ef4444; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="h-screen flex flex-col p-2 gap-2">

    <nav class="glass-panel px-6 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center space-x-6">
            <span class="text-2xl font-black neon-text tracking-tighter uppercase">HENRY PRO INVEST</span>
            
            <div class="relative">
                <input type="text" id="search-input" placeholder="Tìm mã niêm yết (API)..." 
                    class="bg-slate-950 border border-slate-800 text-cyan-100 text-xs rounded-lg pl-4 pr-10 py-1.5 focus:outline-none w-64 focus:border-cyan-500 transition-all" 
                    oninput="apiSearchLookup(this.value)">
                <div id="search-results" class="absolute top-full left-0 w-full bg-slate-900 border border-slate-700 rounded-b-lg mt-1 hidden z-50 max-h-48 overflow-y-auto"></div>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <div id="connection-status" class="flex items-center space-x-2 text-[10px] font-bold px-3 py-1 rounded-full border border-slate-800">
                <span id="status-dot" class="h-2 w-2 rounded-full bg-red-500"></span>
                <span id="conn-text" class="text-slate-500 uppercase">OFFLINE</span>
            </div>
            <button onclick="toggleModal()" class="p-1.5 hover:bg-slate-800 rounded-lg border border-slate-700 transition"><svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg></button>
        </div>
    </nav>

    <main class="grid grid-cols-12 gap-2 flex-1 min-h-0">
        <div class="col-span-3 glass-panel flex flex-col overflow-hidden">
            <div class="p-3 border-b border-slate-800 text-[10px] font-bold text-slate-500 uppercase">Watchlist Thực (API)</div>
            <div class="flex-1 overflow-y-auto" id="watchlist-container">
                <table class="w-full text-xs">
                    <tbody id="watchlist-body" class="cursor-pointer"></tbody>
                </table>
            </div>
        </div>

        <div class="col-span-6 flex flex-col gap-2">
            <div class="glass-panel flex-[2] overflow-hidden" id="chart-container"></div>
            <div class="glass-panel flex-1 p-4 grid grid-cols-2 gap-4">
                <div class="border-r border-slate-800">
                    <h5 class="text-[10px] font-bold text-cyan-500 mb-2 uppercase">Chỉ số Kỹ thuật (Real-time)</h5>
                    <div class="space-y-2 text-xs" id="tech-scan-results">
                        <div class="flex justify-between"><span>RSI (14):</span> <span id="real-rsi">---</span></div>
                        <div class="flex justify-between"><span>Trend (MA):</span> <span id="real-trend">---</span></div>
                    </div>
                </div>
                <div>
                    <h5 class="text-[10px] font-bold text-red-500 mb-2 uppercase">Đánh giá BCTC (Red Flags)</h5>
                    <div class="space-y-2 text-xs" id="fundamental-results">
                        <div class="flex justify-between"><span>CFO / LNST:</span> <span id="real-cfo">---</span></div>
                        <div class="flex justify-between"><span>Debt / Equity:</span> <span id="real-debt">---</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-3 flex flex-col gap-2">
            <div class="glass-panel h-1/2 flex flex-col">
                <div class="p-3 border-b border-slate-800 text-[10px] font-bold text-slate-500">SỔ LỆNH THỰC</div>
                <div id="order-book" class="flex-1 p-2 font-mono text-[10px]"></div>
            </div>
            <div class="glass-panel flex-1 flex flex-col">
                <div class="p-3 border-b border-slate-800 text-[10px] font-bold text-amber-500">CẢNH BÁO DÒNG TIỀN</div>
                <div id="alert-feed" class="flex-1 overflow-y-auto p-3 space-y-2 text-[10px]"></div>
            </div>
        </div>
    </main>

    <div id="modal-settings" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-[100] bg-slate-950/90">
        <div class="glass-panel w-96 p-8 space-y-4">
            <h3 class="text-center font-bold text-cyan-400">DNSE LIGHTSPEED AUTH</h3>
            <input type="password" id="api-key" placeholder="Client ID" class="w-full bg-slate-900 border border-slate-800 p-2 rounded text-xs outline-none">
            <input type="password" id="api-secret" placeholder="Client Secret" class="w-full bg-slate-900 border border-slate-800 p-2 rounded text-xs outline-none">
            <button onclick="saveSettings()" class="w-full bg-cyan-600 py-2 rounded text-xs font-bold text-white">XÁC THỰC & KẾT NỐI</button>
        </div>
    </div>

    <script>
        // --- HỆ THỐNG KẾT NỐI API THỰC ---
        const API_BASE = "https://api.dnse.com.vn";
        let accessToken = "";
        let watchlist = JSON.parse(localStorage.getItem('hpi_list')) || ["HUT", "STB"];
        let activeSym = watchlist[0];

        // 1. TÌM KIẾM MÃ TỪ API THỰC
        async function apiSearchLookup(query) {
            if (query.length < 2) {
                document.getElementById('search-results').classList.add('hidden');
                return;
            }
            
            // Gọi API tra cứu mã của DNSE
            try {
                const res = await fetch(`${API_BASE}/market-data/v1/symbols?query=${query}`);
                const data = await res.json();
                
                const resultBox = document.getElementById('search-results');
                resultBox.classList.remove('hidden');
                resultBox.innerHTML = data.map(item => `
                    <div class="p-2 hover:bg-slate-800 cursor-pointer text-xs flex justify-between border-b border-slate-800" 
                        onclick="addToWatchlist('${item.symbol}')">
                        <span class="font-bold text-cyan-400">${item.symbol}</span>
                        <span class="text-slate-500 text-[10px]">${item.companyName || ''}</span>
                    </div>
                `).join('');
            } catch (e) { console.error("Search API Error"); }
        }

        function addToWatchlist(sym) {
            if (!watchlist.includes(sym)) {
                watchlist.push(sym);
                localStorage.setItem('hpi_list', JSON.stringify(watchlist));
                renderWatchlist();
            }
            document.getElementById('search-results').classList.add('hidden');
            selectSymbol(sym);
        }

        // 2. KẾT NỐI WEBSOCKET NHẬN DỮ LIỆU THỰC
        async function initDNSE() {
            const id = localStorage.getItem('dnse_id');
            const secret = localStorage.getItem('dnse_secret');
            if(!id || !secret) return;

            // Đổi trạng thái UI
            document.getElementById('conn-text').innerText = "CONNECTING API...";
            
            // Mở WebSocket DNSE Lightspeed
            const ws = new WebSocket("wss://smdata.dnse.com.vn/market-data/v1/websocket");
            
            ws.onopen = () => {
                document.getElementById('conn-text').innerText = "LIVE DATA ACTIVE";
                document.getElementById('status-dot').className = "h-2 w-2 rounded-full bg-cyan-500 shadow-[0_0_10px_#22d3ee]";
                
                // Đăng ký nhận dữ liệu thực cho toàn bộ Watchlist
                ws.send(JSON.stringify({
                    type: "subscribe",
                    symbols: watchlist
                }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                processRealtimeData(data); // Đánh giá & Scan ngay khi có dữ liệu mới
            };
        }

        // 3. HỆ THỐNG SCAN & ĐÁNH GIÁ THỰC (KHÔNG GIẢ LẬP)
        function processRealtimeData(data) {
            // Cập nhật giá trên bảng
            const priceEl = document.getElementById(`price-${data.symbol}`);
            if(priceEl) priceEl.innerText = data.price.toLocaleString('vi-VN');

            if (data.symbol === activeSym) {
                // ĐÁNH GIÁ KỸ THUẬT THỰC
                document.getElementById('real-rsi').innerText = data.rsi || "---";
                document.getElementById('real-trend').innerText = data.price > data.ma20 ? "BULLISH" : "BEARISH";
                document.getElementById('real-trend').className = data.price > data.ma20 ? "text-green-400" : "text-red-400";

                // CẢNH BÁO QUÉT LỆNH THỰC
                if(data.lastVol > 50000) {
                    addAlert(`🔥 BIG ORDER: ${data.symbol} khớp ${data.lastVol.toLocaleString()} CP`, data.side === 'BUY' ? 'success' : 'danger');
                }
            }
        }

        // 4. LẤY DỮ LIỆU BCTC THỰC (SCAN RED FLAGS)
        async function scanFundamentals(sym) {
            try {
                // Gọi API lấy chỉ số tài chính thực
                const res = await fetch(`${API_BASE}/market-data/v1/financials/${sym}/latest`);
                const fin = await res.json();
                
                const cfoRatio = (fin.cfo / fin.netProfit).toFixed(2);
                const debtRatio = (fin.totalDebt / fin.ownerEquity).toFixed(2);

                document.getElementById('real-cfo').innerText = `${cfoRatio}x`;
                document.getElementById('real-debt').innerText = `${debtRatio}x`;

                // Cảnh báo nếu số liệu không hợp lý
                if(cfoRatio < 0.5) document.getElementById('real-cfo').className = "red-flag";
                if(debtRatio > 1.5) document.getElementById('real-debt').className = "red-flag";
            } catch (e) { console.error("Fundamental API Error"); }
        }

        function selectSymbol(sym) {
            activeSym = sym;
            renderWatchlist();
            initChart(sym);
            scanFundamentals(sym); // Gọi API đánh giá BCTC thực cho mã mới
        }

        // --- UI HELPER ---
        function renderWatchlist() {
            const body = document.getElementById('watchlist-body');
            body.innerHTML = watchlist.map(sym => `
                <tr class="border-b border-slate-800/50 transition-all ${sym === activeSym ? 'active-row' : ''}" onclick="selectSymbol('${sym}')">
                    <td class="p-3 font-bold text-cyan-400 uppercase">${sym}</td>
                    <td class="p-3 text-right font-mono" id="price-${sym}">---</td>
                    <td class="p-3 text-right"><button onclick="removeSymbol('${sym}')" class="text-slate-600 hover:text-red-500">×</button></td>
                </tr>
            `).join('');
        }

        function removeSymbol(sym) {
            watchlist = watchlist.filter(s => s !== sym);
            localStorage.setItem('hpi_list', JSON.stringify(watchlist));
            renderWatchlist();
        }

        function toggleModal() {
            const m = document.getElementById('modal-settings');
            m.classList.toggle('opacity-0');
            m.classList.toggle('pointer-events-none');
        }

        function saveSettings() {
            localStorage.setItem('dnse_id', document.getElementById('api-key').value);
            localStorage.setItem('dnse_secret', document.getElementById('api-secret').value);
            toggleModal();
            initDNSE();
        }

        function addAlert(msg, type) {
            const feed = document.getElementById('alert-feed');
            const div = document.createElement('div');
            div.className = `p-2 rounded border-l-2 ${type === 'success' ? 'bg-green-900/10 border-green-500 text-green-400' : 'bg-red-900/10 border-red-500 text-red-400'}`;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            feed.prepend(div);
        }

        function initChart(sym) {
            document.getElementById('chart-container').innerHTML = `<div id="tv_chart_box" class="h-full"></div>`;
            new TradingView.widget({
                "autosize": true, "symbol": "HOSE:" + sym,
                "interval": "D", "theme": "dark", "container_id": "tv_chart_box"
            });
        }

        window.onload = () => {
            renderWatchlist();
            selectSymbol(activeSym);
            if(localStorage.getItem('dnse_id')) initDNSE();
        };
    </script>
</body>
</html>
