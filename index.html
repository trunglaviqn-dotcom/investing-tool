<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Pro Invest V23 - Smart Routing AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary-purple: #7c3aed; --bg-light: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: #1e293b; overflow: hidden; }
        .glass-panel { background: #ffffff; border: 1px solid #e5e7eb; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .active-symbol { border-left: 4px solid var(--primary-purple); background-color: #f5f3ff; font-weight: 800; }
        .scroll-hidden::-webkit-scrollbar { width: 4px; }
        .scroll-hidden::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .markdown-body h3 { font-size: 11px; font-weight: 900; color: var(--primary-purple); text-transform: uppercase; margin-top: 12px; border-bottom: 1px solid #f3f4f6; padding-bottom: 4px; }
        .markdown-body p, .markdown-body li { font-size: 11px; margin-bottom: 8px; line-height: 1.6; color: #475569; }
    </style>
</head>
<body class="h-screen flex flex-col p-3 gap-3">

    <header class="glass-panel px-6 py-4 rounded-3xl flex justify-between items-center shrink-0">
        <div class="flex items-center space-x-6">
            <span class="text-2xl font-black tracking-tighter">HENRY PRO <span class="text-purple-600">INVEST</span></span>
            <input type="text" id="search-input" placeholder="Mã CP (VD: HUT)..." 
                class="bg-slate-50 border border-slate-200 text-sm px-5 py-2 rounded-2xl outline-none focus:ring-2 focus:ring-purple-100 focus:border-purple-500 w-44 uppercase font-bold"
                onkeypress="if(event.key === 'Enter') addToWatchlist()">
        </div>

        <div class="flex items-center space-x-4">
            <button onclick="toggleModal('api-modal')" class="text-[10px] font-bold border px-4 py-2 rounded-2xl hover:bg-slate-50 transition">⚙️ CONFIG API KEY</button>
            <div class="flex flex-col items-end border-l pl-5">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Định tuyến thông minh</span>
                <span class="text-xs font-bold text-green-500 flex items-center">
                    <span class="h-2 w-2 bg-green-500 rounded-full mr-2 animate-pulse"></span> SMART FALLBACK AI
                </span>
            </div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-3 min-h-0">
        <aside class="col-span-2 glass-panel rounded-3xl flex flex-col overflow-hidden">
            <div class="p-4 border-b bg-slate-50/50 flex justify-between items-center font-black text-[10px] text-slate-400 uppercase">Danh mục</div>
            <div id="watchlist-container" class="flex-1 overflow-y-auto scroll-hidden p-2 space-y-1"></div>
        </aside>

        <section class="col-span-6 glass-panel rounded-3xl p-10 flex flex-col items-center justify-center bg-gradient-to-br from-white to-purple-50/50">
            <div class="text-center mb-8">
                <h1 id="dash-symbol" class="text-7xl font-black text-slate-800 tracking-tighter mb-2">---</h1>
                <p id="dash-status" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Real-time Analysis Hub</p>
            </div>

            <div class="grid grid-cols-2 gap-6 w-full max-w-lg mb-10">
                <div class="bg-white p-7 rounded-3xl border border-slate-100 text-center shadow-sm">
                    <span class="block text-[10px] font-bold text-slate-400 uppercase mb-3">Giá Hiện Tại</span>
                    <span id="live-price" class="text-5xl font-black">---</span>
                    <span id="live-change" class="block text-xs font-bold mt-3">---</span>
                </div>
                <div class="bg-white p-7 rounded-3xl border border-slate-100 shadow-sm text-center flex flex-col justify-center">
                    <span class="block text-[10px] font-bold text-slate-400 uppercase mb-3">Khối Lượng Khớp</span>
                    <span id="live-vol" class="text-3xl font-black text-purple-600">---</span>
                </div>
            </div>

            <div class="flex space-x-3">
                <button onclick="openChart('tradingview')" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold text-xs shadow-xl hover:scale-105 transition">TRADINGVIEW (VN)</button>
                <button onclick="openChart('fireant')" class="bg-white border border-slate-200 px-8 py-4 rounded-2xl font-bold text-xs shadow-sm hover:bg-slate-50 transition">FIREANT FULL</button>
            </div>
        </section>

        <aside class="col-span-4 flex flex-col gap-3 overflow-hidden">
            <div class="glass-panel rounded-3xl p-5 flex justify-between items-center border-b-4 border-purple-600">
                <span class="text-[11px] font-black text-purple-600 uppercase">✨ Henry AI Analyst</span>
                <button onclick="generateAI()" id="btn-ai" class="bg-purple-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-lg shadow-purple-200 hover:bg-purple-700 transition disabled:opacity-50">RUN AI</button>
            </div>
            
            <div class="glass-panel rounded-3xl flex-1 overflow-y-auto scroll-hidden p-6 relative">
                <div id="ai-loading" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                    <div class="h-8 w-8 border-4 border-purple-600 border-t-transparent rounded-full animate-spin mb-3"></div>
                    <span id="ai-status-text" class="text-[10px] font-bold text-purple-600 uppercase animate-pulse text-center px-4">Đang kết nối API...</span>
                </div>
                <div id="ai-content" class="markdown-body">
                    <div class="text-center text-slate-400 text-[11px] mt-20">Vui lòng chọn mã và bấm <b>RUN AI</b>.</div>
                </div>
            </div>
        </aside>
    </main>

    <div id="api-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl w-[400px] shadow-2xl">
            <h3 class="text-xl font-black mb-2">Cấu hình API Key</h3>
            <p class="text-[11px] text-slate-500 mb-6">Nhập khóa API Gemini của anh để hệ thống hoạt động.</p>
            <input type="password" id="gemini-key" class="w-full border border-slate-200 p-3 rounded-2xl text-sm mb-6 outline-none focus:border-purple-500 font-mono" placeholder="Dán API Key vào đây...">
            <div class="flex justify-end space-x-3">
                <button onclick="toggleModal('api-modal')" class="px-5 py-2 text-xs font-bold text-slate-500">Hủy</button>
                <button onclick="saveKeys()" class="px-8 py-2 bg-purple-600 text-white rounded-2xl text-xs font-bold shadow-lg shadow-purple-100">KÍCH HOẠT</button>
            </div>
        </div>
    </div>

    <script>
        let watchlist = JSON.parse(localStorage.getItem('hpi_v23_wl')) || ["HUT", "MBB", "STB"];
        let activeSym = watchlist[0];
        let priceInterval = null;

        // FETCH DATA TỪ VNDIRECT QUA ALLORIGINS
        async function fetchPrice(sym) {
            try {
                const target = encodeURIComponent(`https://finfo-api.vndirect.com.vn/v4/stock_quotes?q=code:${sym}`);
                const res = await fetch(`https://api.allorigins.win/raw?url=${target}`);
                const data = await res.json();
                
                if(data && data.data && data.data.length > 0) {
                    const s = data.data[0];
                    const price = s.matchPrice || s.basicPrice;
                    const change = price - s.basicPrice;
                    const pct = (change / s.basicPrice) * 100;

                    const pEl = document.getElementById('live-price');
                    pEl.innerText = price.toFixed(2).replace('.', ',');
                    pEl.className = `text-5xl font-black ${change > 0 ? 'text-green-500' : (change < 0 ? 'text-red-500' : 'text-yellow-500')}`;
                    
                    document.getElementById('live-change').innerText = `${change > 0 ? '+' : ''}${change.toFixed(2).replace('.', ',')} (${pct.toFixed(2).replace('.', ',')}%)`;
                    document.getElementById('live-change').className = `block text-xs font-bold mt-3 ${change >= 0 ? 'text-green-500' : 'text-red-500'}`;
                    document.getElementById('live-vol').innerText = (s.nmVolume || 0).toLocaleString('vi-VN');
                }
            } catch(e) { console.error("Lỗi dữ liệu giá"); }
        }

        // TỰ ĐỘNG DÒ TÌM VÀ CHUYỂN KÊNH KHI BỊ NGHẼN (FALLBACK)
        async function generateAI() {
            const key = localStorage.getItem('hpi_gemini_key_v23');
            if(!key) { 
                toggleModal('api-modal'); 
                return; 
            }

            const loadingScreen = document.getElementById('ai-loading');
            const statusText = document.getElementById('ai-status-text');
            const contentBox = document.getElementById('ai-content');
            const btnAi = document.getElementById('btn-ai');
            
            btnAi.disabled = true;
            loadingScreen.classList.remove('hidden');
            
            try {
                statusText.innerText = "Đang lấy danh sách các Model khả dụng...";
                const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const listData = await listRes.json();
                
                if(listData.error) throw new Error(`Lỗi xác thực Key: ${listData.error.message}`);

                const validModels = listData.models.filter(m => 
                    m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent")
                );

                if(validModels.length === 0) throw new Error("API Key không có quyền sử dụng Model nào.");

                const stbData = activeSym === "STB" ? "Lưu ý nội bộ: LNST 2026 ước xấp xỉ 8.100 tỷ, định giá năm 2026 là xấp xỉ 70.000 VNĐ." : "";
                const prompt = `Bạn là Chuyên gia Phân tích Tài chính. Phân tích mã ${activeSym}. ${stbData} Yêu cầu: 1. Kỹ thuật (Wyckoff/Ichimoku), 2. Cơ bản (P/E, P/B, Tài sản), 3. Vùng mua mục tiêu. Trình bày Markdown ngắn gọn, sử dụng dấu phẩy (,) cho số thập phân.`;

                let success = false;
                let lastErrorMsg = "";

                // VÒNG LẶP FALLBACK: Thử từng model, nếu lỗi "high demand" thì chuyển sang model tiếp theo
                for(let i = 0; i < validModels.length; i++) {
                    const modelName = validModels[i].name;
                    statusText.innerText = `Đang thử gọi Model:\n${modelName.replace('models/', '')}`;
                    
                    try {
                        const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${key}`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{parts: [{text: prompt}]}] })
                        });
                        
                        const aiData = await aiRes.json();
                        
                        if(aiData.error) throw new Error(aiData.error.message);
                        
                        // Thành công!
                        contentBox.innerHTML = marked.parse(aiData.candidates[0].content.parts[0].text);
                        success = true;
                        break; // Thoát vòng lặp ngay lập tức
                        
                    } catch(err) {
                        lastErrorMsg = err.message;
                        // Nếu lỗi do mạng nghẽn của Google, tiếp tục vòng lặp sang model khác
                        if(lastErrorMsg.toLowerCase().includes("high demand") || lastErrorMsg.toLowerCase().includes("overloaded")) {
                            console.log(`Model ${modelName} quá tải, đang chuyển kênh...`);
                            continue;
                        } else {
                            // Nếu lỗi khác (ví dụ sai Key), ném lỗi ra ngoài luôn
                            throw err; 
                        }
                    }
                }

                // Nếu chạy hết tất cả các model mà vẫn không thành công
                if(!success) {
                    throw new Error(`Toàn bộ hệ thống Google AI hiện đang quá tải toàn cầu. Vui lòng thử lại sau 2-3 phút.\nChi tiết: ${lastErrorMsg}`);
                }
                
            } catch(e) {
                contentBox.innerHTML = `
                    <div class="p-4 bg-red-50 rounded-2xl border border-red-200">
                        <span class="text-red-600 text-[11px] font-black uppercase block mb-1">🚨 Lỗi Hệ Thống:</span>
                        <span class="text-slate-600 text-[11px] font-mono block p-2 bg-white rounded">${e.message}</span>
                        <p class="text-[10px] mt-2 text-slate-500 italic">Nếu báo lỗi Overloaded, anh vui lòng chờ 1-2 phút rồi bấm RUN AI lại nhé.</p>
                    </div>`;
            } finally { 
                loadingScreen.classList.add('hidden'); 
                btnAi.disabled = false;
            }
        }

        function openChart(type) {
            const url = type === 'tradingview' ? `https://vn.tradingview.com/chart/?symbol=HOSE:${activeSym}` : `https://fireant.vn/dashboard/content/chart/${activeSym}`;
            window.open(url, `Chart_${activeSym}`, "width=1200,height=700");
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        function saveKeys() {
            const keyInput = document.getElementById('gemini-key').value.trim();
            localStorage.setItem('hpi_gemini_key_v23', keyInput);
            toggleModal('api-modal');
            if(keyInput) {
                generateAI();
            }
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlist-container');
            container.innerHTML = watchlist.map(s => `
                <div onclick="selectSym('${s}')" class="p-4 rounded-2xl cursor-pointer transition-all mb-1 ${s === activeSym ? 'active-symbol shadow-sm' : 'hover:bg-slate-50'}">
                    <span class="text-sm font-semibold">${s}</span>
                </div>`).join('');
        }

        function addToWatchlist() {
            const v = document.getElementById('search-input').value.toUpperCase().trim();
            if(v && !watchlist.includes(v)) {
                watchlist.unshift(v);
                localStorage.setItem('hpi_v23_wl', JSON.stringify(watchlist));
                renderWatchlist();
            }
            selectSym(v || activeSym);
            document.getElementById('search-input').value = '';
        }

        function selectSym(s) {
            activeSym = s;
            document.getElementById('dash-symbol').innerText = s;
            renderWatchlist();
            if(priceInterval) clearInterval(priceInterval);
            fetchPrice(s);
            priceInterval = setInterval(() => fetchPrice(s), 5000);
        }

        window.onload = () => {
            renderWatchlist();
            selectSym(activeSym);
            // Tự động điền lại Key nếu đã lưu trước đó
            const savedKey = localStorage.getItem('hpi_gemini_key_v23') || localStorage.getItem('hpi_gemini_key_v22') || "";
            document.getElementById('gemini-key').value = savedKey;
            if(savedKey && !localStorage.getItem('hpi_gemini_key_v23')) {
                 localStorage.setItem('hpi_gemini_key_v23', savedKey);
            }
        };
    </script>
</body>
</html>
