<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Pro Invest - Premium Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #7c3aed;
            --light-purple: #f5f3ff;
            --border-color: #e5e7eb;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            overflow: hidden;
        }
        .glass-panel { 
            background: #ffffff; 
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
        .active-tab { 
            background-color: var(--primary-purple); 
            color: white !important;
        }
        .watchlist-item:hover {
            background-color: var(--light-purple);
        }
        .active-symbol {
            border-left: 4px solid var(--primary-purple);
            background-color: var(--light-purple);
        }
        .scroll-hidden::-webkit-scrollbar { width: 4px; }
        .scroll-hidden::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-3 gap-3">

    <header class="glass-panel px-6 py-4 rounded-2xl flex justify-between items-center shrink-0">
        <div class="flex items-center space-x-8">
            <span class="text-2xl font-black tracking-tighter text-slate-900">
                HENRY PRO <span class="text-[#7c3aed]">INVEST</span>
            </span>
            
            <div class="relative flex items-center group">
                <input type="text" id="search-input" placeholder="Thêm mã (VD: HUT, STB)..." 
                    class="bg-slate-50 border border-slate-200 text-sm px-5 py-2 rounded-xl outline-none focus:border-[#7c3aed] focus:ring-2 focus:ring-purple-100 w-72 transition-all uppercase font-semibold">
                <button onclick="addToWatchlist()" class="ml-3 bg-[#7c3aed] text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-purple-700 transition shadow-lg shadow-purple-200">
                    + THÊM MÃ
                </button>
            </div>
        </div>

        <div class="flex items-center space-x-6">
            <div class="flex flex-col items-end">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Trạng thái hệ thống</span>
                <span class="text-xs font-bold text-purple-600 flex items-center">
                    <span class="h-2 w-2 bg-purple-600 rounded-full mr-2 animate-pulse"></span>
                    TRADINGVIEW LIVE
                </span>
            </div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-3 min-h-0">
        
        <aside class="col-span-2 glass-panel rounded-2xl flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <span class="text-[11px] font-black text-slate-400 uppercase tracking-wider">Danh mục của anh</span>
                <span id="wl-count" class="text-[10px] font-bold bg-white border px-2 py-0.5 rounded-full text-purple-600">0</span>
            </div>
            <div id="watchlist-container" class="flex-1 overflow-y-auto scroll-hidden p-2 space-y-1">
                </div>
        </aside>

        <section class="col-span-7 glass-panel rounded-2xl overflow-hidden relative shadow-sm">
            <div id="tv_chart_main" class="h-full w-full"></div>
        </section>

        <aside class="col-span-3 flex flex-col gap-3 overflow-hidden">
            
            <div class="glass-panel rounded-2xl p-1.5 flex shrink-0 space-x-1">
                <button onclick="setTab('tech')" id="btn-tech" class="flex-1 py-2.5 text-[11px] font-black rounded-xl active-tab transition-all">KỸ THUẬT (TA)</button>
                <button onclick="setTab('fund')" id="btn-fund" class="flex-1 py-2.5 text-[11px] font-black rounded-xl text-slate-500 hover:bg-slate-50 transition-all">CƠ BẢN (FA)</button>
            </div>

            <div id="analysis-box" class="glass-panel rounded-2xl flex-1 overflow-y-auto scroll-hidden p-5">
                </div>

            <div class="glass-panel rounded-2xl p-5 border-l-4 border-purple-500 bg-gradient-to-br from-white to-purple-50/30">
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[10px] font-black text-purple-400 uppercase tracking-widest">Hệ thống khuyến nghị</span>
                    <span id="rec-label" class="text-[10px] font-black px-2 py-1 rounded bg-purple-600 text-white">---</span>
                </div>
                <div class="text-xs font-semibold text-slate-500 mb-1">Vùng mua mục tiêu:</div>
                <div id="buy-zone" class="text-2xl font-black text-slate-900 tracking-tighter">---</div>
            </div>
        </aside>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. DATA & LOCALSTORAGE
        let symbols = JSON.parse(localStorage.getItem('henry_v10_wl')) || ["HOSE:HUT", "HOSE:STB", "HOSE:VIX"];
        let activeSym = symbols[0];
        let currentTab = 'tech';

        const ANALYTICS = {
            "HOSE:HUT": {
                ta: {
                    wyckoff: "Pha D (Markup). Dòng tiền thông minh bắt đầu đẩy giá khỏi vùng nền tích lũy 16,5 - 17,2. SOS xuất hiện rõ nét.",
                    ichimoku: "Giá nằm trên mây Kumo tím. Tenkan-sen cắt lên Kijun-sen xác nhận xu hướng tăng ngắn hạn.",
                    macd: "MACD duy trì phân kỳ dương. RSI ổn định ở ngưỡng 58,2 (vùng tích lũy tích cực).",
                    targets: ["18,50", "22,00", "28,50"],
                    rec: "STRONG BUY"
                },
                fa: {
                    valuation: "P/B hiện tại 1,2x - Thấp hơn trung bình ngành (1,8x). Định giá kỳ vọng 2026 quanh 70k VND.",
                    cashflow: "CFO dương mạnh nhờ độc quyền thu phí không dừng VETC. Sức khỏe tài chính cải thiện sau tái cấu trúc.",
                    assets: "Sở hữu hệ sinh thái hạ tầng giao thông số 1 VN. Quỹ đất dự án béo bở.",
                    competitors: "CII, HHV (HUT có lợi thế tuyệt đối về dòng tiền từ mảng dịch vụ số).",
                    status: "ĐỊNH GIÁ RẺ",
                    buy: "16,5 - 17,2"
                }
            },
            "HOSE:STB": {
                ta: {
                    wyckoff: "Pha E. Giai đoạn bứt tốc mạnh mẽ (Sign of Strength). Áp lực bán tại đỉnh cũ không đáng kể.",
                    ichimoku: "Giá bám dải trên mây, Chikou Span không có vật cản phía trước.",
                    macd: "Histogram mở rộng biên độ. Xu hướng tăng cực đại.",
                    targets: ["36,80", "42,00", "70,00"],
                    rec: "HOLD / BUY +"
                },
                fa: {
                    valuation: "LNST 2026 dự kiến xấp xỉ 8.100 tỷ. Định giá cực kỳ hấp dẫn khi hoàn tất xử lý nợ xấu VAMC.",
                    cashflow: "Dòng tiền từ hoạt động tín dụng tăng trưởng 15% YoY.",
                    assets: "Tài sản ròng sạch nhất trong nhóm Ngân hàng TMCP sau tái cơ cấu.",
                    competitors: "ACB, MBB (STB có câu chuyện đấu giá cổ phần riêng biệt).",
                    status: "HÀNG CHIẾN LƯỢC",
                    buy: "31,0 - 32,5"
                }
            }
        };

        // 2. TRADINGVIEW INTEGRATION
        function initMainChart(sym) {
            new TradingView.widget({
                "autosize": true,
                "symbol": sym,
                "interval": "D",
                "timezone": "Asia/Ho_Chi_Minh",
                "theme": "light",
                "style": "1",
                "locale": "vi",
                "toolbar_bg": "#f8fafc",
                "enable_publishing": false,
                "withdateranges": true,
                "hide_side_toolbar": false, // Để anh có thể vẽ chart
                "allow_symbol_change": true,
                "save_image": true,
                "container_id": "tv_chart_main",
                "studies": [
                    "RSI@tv-basicstudies",
                    "MACD@tv-basicstudies",
                    "StochasticRSI@tv-basicstudies"
                ]
            });
            updateAnalysisUI(sym);
        }

        // 3. WATCHLIST & SEARCH LOGIC
        function renderWatchlist() {
            const container = document.getElementById('watchlist-container');
            container.innerHTML = '';
            symbols.forEach(s => {
                const isActive = s === activeSym ? 'active-symbol' : '';
                const code = s.split(':')[1];
                container.innerHTML += `
                    <div onclick="selectSym('${s}')" class="watchlist-item p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all border border-transparent mb-1 ${isActive}">
                        <span class="font-extrabold text-sm text-slate-700">${code}</span>
                        <button onclick="removeSym(event, '${s}')" class="text-slate-300 hover:text-red-500 font-bold">×</button>
                    </div>
                `;
            });
            document.getElementById('wl-count').innerText = symbols.length;
        }

        function addToWatchlist() {
            const val = document.getElementById('search-input').value.trim().toUpperCase();
            if (!val) return;
            const fullCode = val.includes(':') ? val : `HOSE:${val}`;
            if (!symbols.includes(fullCode)) {
                symbols.push(fullCode);
                localStorage.setItem('henry_v10_wl', JSON.stringify(symbols));
                renderWatchlist();
            }
            document.getElementById('search-input').value = '';
            selectSym(fullCode);
        }

        function removeSym(e, s) {
            e.stopPropagation();
            symbols = symbols.filter(item => item !== s);
            localStorage.setItem('henry_v10_wl', JSON.stringify(symbols));
            renderWatchlist();
        }

        function selectSym(s) {
            activeSym = s;
            initMainChart(s);
            renderWatchlist();
        }

        // 4. ANALYSIS UPDATE
        function setTab(t) {
            currentTab = t;
            document.getElementById('btn-tech').className = t === 'tech' ? 'flex-1 py-2.5 text-[11px] font-black rounded-xl active-tab transition-all' : 'flex-1 py-2.5 text-[11px] font-black rounded-xl text-slate-500 hover:bg-slate-50 transition-all';
            document.getElementById('btn-fund').className = t === 'fund' ? 'flex-1 py-2.5 text-[11px] font-black rounded-xl active-tab transition-all' : 'flex-1 py-2.5 text-[11px] font-black rounded-xl text-slate-500 hover:bg-slate-50 transition-all';
            updateAnalysisUI(activeSym);
        }

        function updateAnalysisUI(sym) {
            const data = ANALYTICS[sym] || ANALYTICS["HOSE:HUT"];
            const box = document.getElementById('analysis-box');
            
            if (currentTab === 'tech') {
                box.innerHTML = `
                    <div class="space-y-5">
                        <section>
                            <h4 class="text-[10px] font-black text-purple-500 uppercase mb-2">Wyckoff / Dòng tiền</h4>
                            <p class="text-xs leading-relaxed text-slate-600 font-medium">${data.ta.wyckoff}</p>
                        </section>
                        <section>
                            <h4 class="text-[10px] font-black text-purple-500 uppercase mb-2">Ichimoku Cloud</h4>
                            <p class="text-xs leading-relaxed text-slate-600 font-medium">${data.ta.ichimoku}</p>
                        </section>
                        <section>
                            <h4 class="text-[10px] font-black text-purple-500 uppercase mb-2">Động lượng MACD/RSI</h4>
                            <p class="text-xs leading-relaxed text-slate-600 font-medium">${data.ta.macd}</p>
                        </section>
                        <div class="grid grid-cols-3 gap-2 pt-4 border-t border-slate-100">
                            <div class="text-center bg-slate-50 p-2 rounded-lg">
                                <span class="block text-[8px] font-bold text-slate-400">T+</span>
                                <span class="text-xs font-black text-purple-600">${data.ta.targets[0]}</span>
                            </div>
                            <div class="text-center bg-slate-50 p-2 rounded-lg">
                                <span class="block text-[8px] font-bold text-slate-400">TRUNG</span>
                                <span class="text-xs font-black text-purple-600">${data.ta.targets[1]}</span>
                            </div>
                            <div class="text-center bg-slate-50 p-2 rounded-lg">
                                <span class="block text-[8px] font-bold text-slate-400">DÀI</span>
                                <span class="text-xs font-black text-purple-600">${data.ta.targets[2]}</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                box.innerHTML = `
                    <div class="space-y-5">
                        <section>
                            <h4 class="text-[10px] font-black text-blue-500 uppercase mb-2">Định giá & Dòng tiền</h4>
                            <p class="text-xs leading-relaxed text-slate-600 font-medium">${data.fa.valuation} <br> ${data.fa.cashflow}</p>
                        </section>
                        <section>
                            <h4 class="text-[10px] font-black text-blue-500 uppercase mb-2">Chất lượng tài sản</h4>
                            <p class="text-xs leading-relaxed text-slate-600 font-medium">${data.fa.assets}</p>
                        </section>
                        <section>
                            <h4 class="text-[10px] font-black text-blue-500 uppercase mb-2">Đối thủ & Ngành</h4>
                            <p class="text-xs leading-relaxed text-slate-600 font-medium">${data.fa.competitors}</p>
                        </section>
                        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                            <span class="text-[10px] font-black text-blue-600 block mb-1 uppercase">Kết luận định giá</span>
                            <span class="text-xs font-bold text-blue-900">${data.fa.status}</span>
                        </div>
                    </div>
                `;
            }
            document.getElementById('rec-label').innerText = data.ta.rec;
            document.getElementById('buy-zone').innerText = data.fa.buy;
        }

        // INIT
        window.onload = () => {
            renderWatchlist();
            initMainChart(activeSym);
        };
    </script>
</body>
</html>
