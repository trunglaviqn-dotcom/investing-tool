<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Pro Invest - DNSE & Gemini AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary-purple: #7c3aed; --border-color: #e5e7eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; overflow: hidden; }
        .glass-panel { background: #ffffff; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .active-symbol { border-left: 4px solid var(--primary-purple); background-color: #f5f3ff; }
        .scroll-hidden::-webkit-scrollbar { width: 4px; }
        .scroll-hidden::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .markdown-body h3 { font-size: 11px; font-weight: 900; color: #7c3aed; text-transform: uppercase; margin-top: 12px; }
        .markdown-body p, .markdown-body li { font-size: 11px; color: #475569; line-height: 1.6; margin-bottom: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col p-3 gap-3">

    <header class="glass-panel px-6 py-4 rounded-2xl flex justify-between items-center shrink-0">
        <div class="flex items-center space-x-6">
            <span class="text-2xl font-black tracking-tighter">HENRY PRO <span class="text-purple-600">INVEST</span></span>
            <input type="text" id="search-input" placeholder="Mã CP (VD: HUT, MBB)..." 
                class="bg-slate-50 border border-slate-200 text-sm px-4 py-2 rounded-xl outline-none focus:border-purple-500 w-48 uppercase font-bold"
                onkeypress="if(event.key === 'Enter') addToWatchlist()">
        </div>

        <div class="flex items-center space-x-3">
            <button onclick="toggleModal('api-modal')" class="text-[10px] font-bold border border-slate-200 px-3 py-2 rounded-xl hover:bg-slate-50 transition">⚙️ DNSE & GEMINI KEYS</button>
            <div class="flex flex-col items-end border-l pl-4">
                <span id="conn-status" class="text-[10px] font-bold text-red-500 flex items-center">
                    <span id="conn-dot" class="h-2 w-2 bg-red-500 rounded-full mr-2"></span> DNSE OFFLINE
                </span>
            </div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-3 min-h-0">
        <aside class="col-span-2 glass-panel rounded-2xl flex flex-col overflow-hidden">
            <div class="p-4 border-b bg-slate-50/50 flex justify-between items-center">
                <span class="text-[10px] font-black text-slate-400 uppercase">Danh mục</span>
                <span id="wl-count" class="text-[10px] font-bold text-purple-600">0</span>
            </div>
            <div id="watchlist-container" class="flex-1 overflow-y-auto scroll-hidden p-2 space-y-1"></div>
        </aside>

        <section class="col-span-6 glass-panel rounded-2xl p-8 flex flex-col items-center justify-center bg-gradient-to-br from-white to-purple-50/50">
            <div class="text-center mb-6">
                <h1 id="dash-symbol" class="text-6xl font-black text-slate-800 tracking-tighter mb-1">---</h1>
                <p id="dash-session" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Đang chờ kết nối DNSE...</p>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full max-w-sm mb-8">
                <div class="bg-white p-6 rounded-2xl border text-center shadow-sm">
                    <span class="block text-[9px] font-bold text-slate-400 uppercase mb-2">Giá Khớp (DNSE)</span>
                    <span id="live-price" class="text-4xl font-black">---</span>
                    <span id="live-change" class="block text-[11px] font-bold mt-2">---</span>
                </div>
                <div class="bg-white p-6 rounded-2xl border text-center shadow-sm flex flex-col justify-center">
                    <span class="block text-[9px] font-bold text-slate-400 uppercase mb-2">KL Khớp Gần Nhất</span>
                    <span id="live-last-vol" class="text-2xl font-black text-purple-600">---</span>
                </div>
            </div>

            <button onclick="openChart()" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold shadow-xl hover:scale-105 transition">📊 Xem Biểu Đồ Pop-up</button>
        </section>

        <aside class="col-span-4 flex flex-col gap-3 overflow-hidden">
            <div class="glass-panel rounded-2xl p-4 flex justify-between items-center shrink-0 border-b-4 border-purple-600">
                <span class="text-[11px] font-black text-purple-600 uppercase tracking-widest">✨ Henry AI Analysis</span>
                <button onclick="generateAI()" id="btn-ai" class="bg-purple-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-purple-700 transition">PHÂN TÍCH</button>
            </div>
            <div class="glass-panel rounded-2xl flex-1 overflow-y-auto scroll-hidden p-5 relative">
                <div id="ai-loading" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-10">
                    <div class="h-6 w-6 border-2 border-purple-600 border-t-transparent rounded-full animate-spin mb-2"></div>
                    <span class="text-[10px] font-bold text-purple-600">AI đang soi BCTC từ DNSE Data...</span>
                </div>
                <div id="ai-content" class="markdown-body text-slate-400 text-center text-[11px] mt-10">Cài đặt API Keys và chọn mã để bắt đầu.</div>
            </div>
        </aside>
    </main>

    <div id="api-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-[450px] shadow-2xl">
            <h3 class="text-lg font-black mb-4">Cấu hình Hệ thống</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">DNSE API Key</label>
                <input type="password" id="dnse-key" class="w-full border p-2 rounded-lg text-sm mt-1"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">DNSE API Secret</label>
                <input type="password" id="dnse-secret" class="w-full border p-2 rounded-lg text-sm mt-1"></div>
                <hr>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Gemini AI Key</label>
                <input type="password" id="gemini-key" class="w-full border p-2 rounded-lg text-sm mt-1"></div>
            </div>
            <div class="flex justify-end mt-6 space-x-2">
                <button onclick="toggleModal('api-modal')" class="px-4 py-2 text-xs font-bold">Đóng</button>
                <button onclick="saveKeys()" class="px-6 py-2 bg-purple-600 text-white rounded-xl text-xs font-bold">Lưu Tất Cả</button>
            </div>
        </div>
    </div>

    <script>
        let watchlist = JSON.parse(localStorage.getItem('hpi_v17_wl')) || ["HUT", "MBB", "STB"];
        let activeSym = watchlist[0];
        let ws = null;

        // --- 1. DNSE AUTH & WEBSOCKET ---
        async function connectDNSE() {
            const apiKey = localStorage.getItem('dnse_key');
            const apiSecret = localStorage.getItem('dnse_secret');
            if(!apiKey || !apiSecret) return;

            document.getElementById('conn-status').innerHTML = `<span class="h-2 w-2 bg-yellow-500 rounded-full mr-2 animate-ping"></span> ĐANG KẾT NỐI...`;
            
            // DNSE WSS Public - Theo tài liệu Market Data
            if(ws) ws.close();
            ws = new WebSocket("wss://ws-openapi.dnse.com.vn");

            ws.onopen = () => {
                document.getElementById('conn-status').innerHTML = `<span class="h-2 w-2 bg-green-500 rounded-full mr-2"></span> DNSE LIVE`;
                document.getElementById('conn-status').className = "text-[10px] font-bold text-green-500 flex items-center";
                
                // Subscribe theo đúng định dạng tài liệu anh gửi
                ws.send(JSON.stringify({
                    action: "subscribe",
                    channels: ["Trade", "Quote"],
                    symbols: [activeSym]
                }));

                // Heartbeat (Ping/Pong)
                setInterval(() => { if(ws.readyState === 1) ws.send("PING"); }, 120000);
            };

            ws.onmessage = (e) => {
                if(e.data === "PING") { ws.send("PONG"); return; }
                try {
                    const data = JSON.parse(e.data);
                    if(data.symbol === activeSym && data.price) {
                        updatePriceUI(data);
                    }
                } catch(err){}
            };
        }

        function updatePriceUI(data) {
            const p = document.getElementById('live-price');
            const diff = data.price - (data.basicPrice || data.openPrice || data.price);
            p.innerText = data.price.toFixed(2).replace('.', ',');
            p.className = `text-4xl font-black ${diff >= 0 ? 'text-green-500' : 'text-red-500'}`;
            document.getElementById('live-last-vol').innerText = (data.quantity || 0).toLocaleString('vi-VN');
            document.getElementById('dash-session').innerText = `Phiên: ${data.tradingSessionId || 'Liên tục'}`;
        }

        // --- 2. AI ANALYSIS ---
        async function generateAI() {
            const aiKey = localStorage.getItem('gemini_key');
            if(!aiKey) return alert("Cài đặt AI Key trước!");

            document.getElementById('ai-loading').classList.remove('hidden');
            const prompt = `Bạn là chuyên gia SHS. Phân tích mã ${activeSym}. 
            Dữ liệu nội bộ: Nếu là STB, lợi nhuận 2026 xấp xỉ 8100 tỷ, định giá 70k.
            Trả về Markdown ngắn gọn: 1. Kỹ thuật (Wyckoff), 2. Cơ bản, 3. Kết luận mua/bán.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{parts: [{text: prompt}]}] })
                });
                const d = await res.json();
                document.getElementById('ai-content').innerHTML = marked.parse(d.candidates[0].content.parts[0].text);
            } catch(e) {
                document.getElementById('ai-content').innerText = "Lỗi kết nối AI.";
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
            }
        }

        // --- 3. UTILS ---
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        function saveKeys() {
            localStorage.setItem('dnse_key', document.getElementById('dnse-key').value);
            localStorage.setItem('dnse_secret', document.getElementById('dnse-secret').value);
            localStorage.setItem('gemini_key', document.getElementById('gemini-key').value);
            toggleModal('api-modal');
            connectDNSE();
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlist-container');
            container.innerHTML = watchlist.map(s => `
                <div onclick="selectSym('${s}')" class="p-4 rounded-xl cursor-pointer transition ${s === activeSym ? 'active-symbol font-bold' : ''}">
                    <span class="text-sm">${s}</span>
                </div>`).join('');
            document.getElementById('wl-count').innerText = watchlist.length;
        }

        function addToWatchlist() {
            const val = document.getElementById('search-input').value.toUpperCase().trim();
            if(val && !watchlist.includes(val)) {
                watchlist.push(val);
                localStorage.setItem('hpi_v17_wl', JSON.stringify(watchlist));
                renderWatchlist();
            }
            selectSym(val);
        }

        function selectSym(s) {
            activeSym = s;
            document.getElementById('dash-symbol').innerText = s;
            renderWatchlist();
            connectDNSE();
        }

        function openChart() {
            window.open(`https://fireant.vn/dashboard/content/chart/${activeSym}`, `Chart_${activeSym}`, "width=1200,height=700");
        }

        window.onload = () => {
            renderWatchlist();
            selectSym(activeSym);
            document.getElementById('dnse-key').value = localStorage.getItem('dnse_key') || "";
            document.getElementById('dnse-secret').value = localStorage.getItem('dnse_secret') || "";
            document.getElementById('gemini-key').value = localStorage.getItem('gemini_key') || "";
        };
    </script>
</body>
</html>
